# Override archetype: inherits spider_big, modifies HP and animations

schema_version = 1
id = "spider_big_t2"
base = "spider_big"

[override.stats]
spawn_hp = 300    # Tier2 is 2x base HP
dmg_ranged = 30   # Tier2 is 3x base damage (10 * 3) (150 * 3)

[override.anim]
Idle       = "anim.spider2.Idle"
Attack     = "anim.spider2.RangedAttack"
Die        = "anim.spider2.Death"
Decay      = "anim.spider2.Decay"
Defense    = "anim.spider2.Defense"
Walk       = "anim.spider2.Walk" 