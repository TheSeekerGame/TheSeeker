[settings]
time_base = "Relative"
tick_quant = "8"
ticks_per_frame = 8
frame_min = 1
frame_max = 9
frame_start = 1

# Speed modification for CDR passives (CRITICAL)
[[script]]
run_at_frame = [1, 2, 3, 4, 5, 6, 7, 8, 9]  # All frames
require_slots_any = ["SerpentRing", "FrenziedAttack", "DeadlyFeather"]
action = "SetTicksPerFrame"
ticks_per_frame = 6

# Phase control - THESE ARE CRITICAL FOR GAMEPLAY
# The game code sets these slots to control which frame plays

# Intro phase control
[[script]]
run_on_slot_enable = "FlickerIntro"
action = "SetFrameNow"
frame_index = 1  # Jump to intro frame

# Dash phase control
[[script]]
run_on_slot_enable = "FlickerDashing"
action = "SetFrameNow"
frame_index = 3  # Jump to dash frame (frame 3 for hammer)

# Keep dash frame from advancing
[[script]]
run_at_frame = [3]  # Dash frame
require_slots_all = ["FlickerDashing"]
action = "SetFrameNext"
frame_index = 3  # Hold on dash frame

# Damage phase control
[[script]]
run_on_slot_enable = "FlickerDamage"
action = "SetFrameNow"
frame_index = 4  # Jump to damage frame (frame 4 for hammer)

# Outro phase control
[[script]]
run_on_slot_enable = "FlickerOutro"
action = "SetFrameNow"
frame_index = 6  # Jump to first outro frame (frame 6 for hammer)

# Direction handling (REQUIRED)
[[script]]
run_on_slot_enable = "DirectionLeft"
action = "SetSpriteFlip"
flip_x = true

[[script]]
run_on_slot_enable = "DirectionRight"
action = "SetSpriteFlip"
flip_x = false

[[script]]
run_at_frame = [4]  # Damage frame (frame 4 for hammer)
action = "PlayAudio"
volume = 0.5
asset_key = "audio.game.HammerSmash"