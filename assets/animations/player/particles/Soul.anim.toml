[settings]
time_base = "Relative"
tick_quant = "8"
ticks_per_frame = 8
frame_min = 1
frame_max = 3
frame_start = 1


[[script]]
run_on_slot_enable = "Bloodstone"
action = "SetFrameNow"
frame_index = 3

[[script]]
run_on_slot_enable = "Bloodstone"
action = "SetFrameNext"
frame_index = 3

[[script]]
run_on_slot_disable = "Bloodstone"
action = "SetFrameNow"
frame_index = 1

[[script]]
run_on_slot_disable = "Bloodstone"
action = "SetFrameNext"
frame_index = 1


[[script]]
run_at_frame = 1
action = "SetFrameNext"
frame_index = 1

[[script]]
run_at_frame = 2
action = "SetFrameNext"
frame_index = 2

[[script]]
run_at_frame = 3
action = "SetFrameNext"
frame_index = 3
